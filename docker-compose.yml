services:

  # ─────────────────────────────────────────
  # KEYCLOAK — JWT Authentication
  # UI    : http://localhost:8180
  # Login : admin / admin
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: esign-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8180:8080"
    networks:
      - esign-network

  # ─────────────────────────────────────────
  # MINIO — File storage (S3 compatible)
  # Console : http://localhost:9001
  # API     : http://localhost:9000
  # Login   : minioadmin / minioadmin
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: esign-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - esign-network

  # ─────────────────────────────────────────
  # POSTGRESQL — Database for all services
  # Port      : 5432
  # User      : esign / esign123
  # Databases : signature_db and archive_db
  # (created by init-db.sh on first startup)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: esign-postgres
    environment:
      POSTGRES_USER: esign
      POSTGRES_PASSWORD: esign123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - esign-network

networks:
  esign-network:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
