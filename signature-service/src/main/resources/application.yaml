server:
  port: 8081

spring:
  application:
    name: signature-service

  datasource:
    url: jdbc:postgresql://localhost:5432/signature_db
    username: esign
    password: esign123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.springframework.web: DEBUG